services:
  wp-final-porttest:
    image: muaeabudhabi/wp-final-porttest:latest
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
      org.titan.app: wp-final-porttest
    environment:
    - NODE_ENV=production
    - LOG_LEVEL=info
    - PUID=99
    - PGID=100
    - UMASK=022
    - DATABASE_URL=postgresql://wp-final-porttest:changeme@wp-final-porttest_postgres:5432/wp-final-porttest
    - REDIS_URL=redis://wp-final-porttest_redis:6379
    volumes:
    - /mnt/user/appdata/wp-final-porttest/data:/data
    - /mnt/user/appdata/wp-final-porttest/config:/config
    logging:
      driver: json-file
      options: &id001
        max-size: 10m
        max-file: '3'
    ports:
    - 3101:3101
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:3101/health || curl -sf http://localhost:3101/healthz
        || curl -sf http://localhost:3101/ || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
    - wp-final-porttest_net
    depends_on:
      wp-final-porttest_postgres:
        condition: service_healthy
      wp-final-porttest_redis:
        condition: service_healthy
  wp-final-porttest_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
    - POSTGRES_DB=wp-final-porttest
    - POSTGRES_USER=wp-final-porttest
    - POSTGRES_PASSWORD=changeme
    volumes:
    - wp-final-porttest_postgres_data:/var/lib/postgresql/data
    networks:
    - wp-final-porttest_net
    logging:
      driver: json-file
      options: *id001
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-app}
      interval: 30s
      timeout: 5s
      retries: 5
  wp-final-porttest_redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment: []
    volumes:
    - wp-final-porttest_redis_data:/data
    networks:
    - wp-final-porttest_net
    logging:
      driver: json-file
      options: *id001
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 30s
      timeout: 5s
      retries: 5
networks:
  wp-final-porttest_net:
    driver: bridge
volumes:
  wp-final-porttest_data:
    driver: local
  wp-final-porttest_postgres_data:
    driver: local
  wp-final-porttest_redis_data:
    driver: local
